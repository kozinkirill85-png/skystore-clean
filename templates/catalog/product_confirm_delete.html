{% extends 'base.html' %}

{% block title %}Удаление продукта - Skystore{% endblock %}

{% block content %}
    <h1>Удаление продукта</h1>

    <p>Вы уверены, что хотите удалить продукт "{{ object.name }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'catalog:product_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
    </form>
{% endblock %}
