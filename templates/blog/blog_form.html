{% extends 'base.html' %}

{% block title %}{% if object %}Редактирование{% else %}Создание{% endif %} статьи - Skystore{% endblock %}

{% block content %}
    <h1>{% if object %}Редактирование{% else %}Создание{% endif %} статьи</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label for="id_title" class="form-label">Заголовок</label>
            <input type="text" class="form-control" id="id_title" name="title" value="{{ form.title.value|default:'' }}" required>
        </div>
        <div class="mb-3">
            <label for="id_content" class="form-label">Содержимое</label>
            <textarea class="form-control" id="id_content" name="content" rows="10" required>{{ form.content.value|default:'' }}</textarea>
        </div>
        <div class="mb-3">
            <label for="id_preview" class="form-label">Превью (изображение)</label>
            <input type="file" class="form-control" id="id_preview" name="preview">
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="id_is_published" name="is_published" {% if form.is_published.value %}checked{% endif %}>
            <label class="form-check-label" for="id_is_published">Опубликовано</label>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{% url 'blog:blog_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
{% endblock %}
