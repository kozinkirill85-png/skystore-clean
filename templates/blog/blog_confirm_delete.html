{% extends 'base.html' %}

{% block title %}Удаление статьи - Skystore{% endblock %}

{% block content %}
    <h1>Удаление статьи</h1>

    <p>Вы уверены, что хотите удалить статью "{{ object.title }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'blog:blog_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
{% endblock %}
